<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget-</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-main: #E8E8E8;
            --text-dim: #7a7a7a;
            --border-color: #2a2a2a;
            --recording-color: #ff4444;
            --danger-color: #ff5c5c;
            --hover-color: #ffffff;
            --fs-scale: 1.1;
            --radius: 14px;
            --radius-sm: 10px;
        }

        /* ══════════════════════════════════════
           MINIMAL & MINIMAL FLAT THEME ENGINE
           ══════════════════════════════════════ */
        :is([data-theme="minimal"], [data-theme="minimal_dark"]) {
            --bg-color: var(--bg);
            --text-main: var(--text-hi);
            --text-dim: var(--dim);
            --border-color: var(--hr);
            --hover-color: var(--text-hi);
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) #app-container {
            border: 2px solid var(--hr) !important;
            padding: 28px 20px !important;
            background: var(--surface) !important;
            box-shadow: none !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) input[type="number"],
        :is([data-theme="minimal"], [data-theme="minimal_dark"]) textarea {
            background: var(--surface2) !important;
            border: 2px solid var(--hr) !important;
            color: var(--text-hi) !important;
            box-shadow: none !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) input.bill-amount-input {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) button {
            background: var(--accent) !important;
            border: 2px solid var(--accent) !important;
            color: var(--on-accent) !important;
            font-weight: 600 !important;
            box-shadow: none !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) button.secondary {
            background: transparent !important;
            border: 2px solid var(--hr) !important;
            color: var(--text-hi) !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) .icon-btn {
            background: transparent !important;
            border: none !important;
            color: var(--text-dim) !important;
            box-shadow: none !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) input[type="checkbox"] {
            border: 2px solid var(--hr) !important;
            background: var(--surface) !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) input[type="checkbox"]::before {
            box-shadow: inset 1em 1em var(--text-hi) !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) .ai-output-card {
            border: 2px solid var(--hr) !important;
            background: var(--surface2) !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) .header-text {
            border-bottom: 2px solid var(--hr) !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) .section-label {
            border-bottom: 2px solid var(--hr) !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) #theme-select {
            border: 2px solid var(--hr) !important;
            background: var(--surface2) !important;
            color: var(--text-hi) !important;
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) #expanded-panel {
            border-top: 2px solid var(--hr) !important;
        }

        .size-btn {
            padding: 6px 14px;
            font-size: 0.75em;
            font-weight: 600;
            min-width: auto !important;
            cursor: pointer;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: var(--radius-sm);
        }
        .size-btn.active {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        :is([data-theme="minimal"], [data-theme="minimal_dark"]) .size-btn {
            background: transparent !important;
            border: 2px solid var(--hr) !important;
            color: var(--text-hi) !important;
            font-weight: 600;
        }
        :is([data-theme="minimal"], [data-theme="minimal_dark"]) .size-btn.active {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
            color: var(--on-accent) !important;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 32px 16px;
            font-size: calc(16px * var(--fs-scale));
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .header-text {
            margin-bottom: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
        }

        .cycle-selector {
            transition: color 0.2s ease, padding-left 0.2s ease;
            user-select: none;
        }

        .cycle-selector.clickable {
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.78em;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .cycle-selector.clickable:hover {
            color: var(--hover-color);
            padding-left: 4px;
        }

        .cycle-selector.active {
            color: var(--text-main);
            font-size: 0.95em;
            font-weight: 600;
            margin-bottom: 6px;
            cursor: default;
        }

        input[type="number"], textarea {
            background: color-mix(in srgb, var(--text-main) 5%, transparent);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95em;
            padding: 14px 16px;
            width: 100%;
            outline: none;
            border-radius: var(--radius-sm);
        }

        input[type="number"]:focus, textarea:focus {
            border-color: color-mix(in srgb, var(--text-main) 40%, var(--border-color));
        }

        input[type="number"]::placeholder, textarea::placeholder {
            color: var(--text-dim);
        }

        textarea {
            height: 90px;
            resize: vertical;
        }

        .action-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 12px 18px;
            font-family: inherit;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius-sm);
            flex: 1;
            min-width: 100px;
        }

        button.secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        button.recording {
            color: var(--recording-color);
            border-color: var(--recording-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        button:hover {
            opacity: 0.85;
        }

        .metric-container {
            text-align: center;
            margin: 6px 0 2px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #total-safe {
            font-size: 2.6em;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        #safe-to-spend {
            font-size: 1em;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.3px;
        }

        .section-label {
            font-size: 0.75em;
            font-weight: 600;
            color: var(--text-dim);
            padding-bottom: 4px;
            margin-top: 4px;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        #bills-list {
            display: flex;
            flex-direction: column;
        }

        .bill-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 14px 2px;
            border-bottom: 1px solid var(--border-color);
        }

        .bill-row:last-child {
            border-bottom: none;
        }

        .bill-left-col {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }

        .bill-text-col {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .bill-name {
            font-size: 0.98em;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bill-subtitle {
            font-size: 0.72em;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .bill-right-col {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            flex-shrink: 0;
        }

        .bill-amount {
            font-size: 1em;
            font-weight: 700;
            color: var(--text-main);
            flex-shrink: 0;
        }

        .bill-amount-input {
            width: 58px !important;
            flex-shrink: 0;
            padding: 0 !important;
            text-align: right;
            font-size: 1em !important;
            font-weight: 700 !important;
            border: none !important;
            border-radius: 0 !important;
            background: transparent !important;
            box-shadow: none !important;
            outline: none !important;
            color: inherit !important;
        }

        .bill-amount-input::-webkit-outer-spin-button,
        .bill-amount-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .bill-amount-input[type=number] {
            -moz-appearance: textfield;
        }

        .overdue-text { color: var(--danger-color) !important; font-weight: 700 !important; }
        .overdue-text.bill-subtitle { color: var(--danger-color) !important; opacity: 0.85; }

        .paid-text {
            text-decoration: line-through;
            color: var(--text-dim) !important;
            font-weight: 500 !important;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            background-color: transparent;
            margin: 0;
            flex-shrink: 0;
            color: currentColor;
            width: 1.35em;
            height: 1.35em;
            border: 1.5px solid var(--border-color);
            border-radius: 6px;
            display: grid;
            place-content: center;
            cursor: pointer;
        }

        input[type="checkbox"]::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            border-radius: 2px;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em var(--text-main);
        }

        input[type="checkbox"]:checked::before {
            transform: scale(1);
        }

        .action-slot {
            width: 30px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .push-btn {
            background: #4a90e2;
            border: none;
            color: #ffffff;
            width: 28px;
            height: 28px;
            flex: 0 0 28px;
            min-width: 0;
            flex-shrink: 0;
            border-radius: 8px;
            padding: 0;
            margin: 0;
            font-size: 0.85em;
            line-height: 1;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .push-btn:hover {
            opacity: 0.85;
        }

        .ai-output-card {
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-top: 8px;
            font-size: 0.88em;
            line-height: 1.5;
            background: color-mix(in srgb, var(--text-main) 4%, transparent);
        }

        /* --- Toggle / expanded panel --- */
        .toggle-row {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            transition: color 0.2s, transform 0.2s;
        }

        .icon-btn:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        #expanded-panel {
            display: none;
            flex-direction: column;
            gap: 16px;
            margin-top: 4px;
            border-top: 1px solid var(--border-color);
            padding-top: 18px;
        }

        .settings-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .settings-label {
            font-size: 0.75em;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #theme-select {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: inherit;
            font-weight: 500;
            font-size: 0.8em;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- System Status -->
        <div class="header-text" id="cycle-header">
            <!-- Populated via JS -->
        </div>

        <!-- Truth Anchor Input -->
        <input type="number" id="balance-input" placeholder="Enter current bank balance..." step="1">

        <!-- The Primary Metrics -->
        <div class="metric-container">
            <div id="total-safe">TOTAL: $0</div>
            <div id="safe-to-spend">$0 / day</div>
        </div>

        <!-- Dynamic Cycle Bills -->
        <div class="section-label" id="bills-section-label">Active bills & liabilities</div>
        <div id="bills-list">
            <!-- Populated via JS -->
        </div>

        <!-- Toggle Button: reveals Gemini tools + settings -->
        <div class="toggle-row">
            <button class="icon-btn" id="settings-toggle-btn" onclick="toggleSettingsMenu()" title="Ask Gemini & settings">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor" style="display: inline-block; transition: transform 0.3s;" id="sparkle-icon">
                    <path d="M12,2 C12,7.5 16.5,12 22,12 C16.5,12 12,16.5 12,22 C12,16.5 7.5,12 2,12 C7.5,12 12,7.5 12,2 Z M19,13 C19,16 21,18 24,18 C21,18 19,20 19,23 C19,20 17,18 14,18 C17,18 19,16 19,13 Z"/>
                </svg>
            </button>
        </div>

        <!-- Expanded Panel: Gemini interface + Theme & Size Switcher -->
        <div id="expanded-panel">
            <textarea id="gemini-input" placeholder="Ask: can I afford to buy..."></textarea>
            <div class="action-row">
                <button onclick="executeLiveTextQuery()">Ask Gemini</button>
                <button class="secondary" id="voice-btn" onclick="toggleVoiceRecording()">Voice input</button>
                <button class="secondary" onclick="alert('Plaid Auth Flow Initiated (Placeholder)')">Sync bank</button>
            </div>
            <div id="ai-response-container"></div>

            <div style="border-top: 1px solid var(--border-color); padding-top: 16px; display:flex; flex-direction:column; gap:12px;">
                <div class="settings-row">
                    <span class="settings-label">Theme</span>
                    <select id="theme-select" onchange="changeTheme(this.value)">
                        <option value="default" style="background: #0b0b0b; color: #E8E8E8;">Default</option>
                        <option value="minimal-light" style="background: #e4e2dd; color: #1a1a1a;">Minimal Light</option>
                        <option value="minimal-warm" style="background: #f4f3f0; color: #111111;">Minimal Warm</option>
                        <option value="minimal-dark" style="background: #1a1a1a; color: #e4e2dd;">Minimal Dark</option>
                        <option value="minimal-oled" style="background: #000000; color: #ffffff;">Minimal OLED</option>
                    </select>
                </div>
                <div class="settings-row">
                    <span class="settings-label">Size</span>
                    <div style="display: flex; gap: 8px;">
                        <button class="size-btn" onclick="changeSize('normal')" id="btn-size-normal">Normal</button>
                        <button class="size-btn" onclick="changeSize('large')" id="btn-size-large">Large</button>
                        <button class="size-btn" onclick="changeSize('huge')" id="btn-size-huge">Huge</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 0. API CONFIGURATION ---
        const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY";

        function getApiKey() {
            let key = localStorage.getItem('gemini-api-key');
            if (!key || key === "YOUR_GEMINI_API_KEY") {
                key = prompt("Please enter your Gemini API Key:", "AIzaSy...");
                if (key) {
                    localStorage.setItem('gemini-api-key', key);
                }
            }
            return key || GEMINI_API_KEY;
        }

        // --- 1. CORE STATE ---
        const state = {
            currentBalance: 0.00,
            cycleStart: null,
            cycleEnd: null,
            daysRemaining: 14,
            currentCycleIndex: 0,
            viewOffset: 0,

            biweeklyExpenses: [
                { id: 'bw_1', name: "Groceries", amount: 200.00 },
                { id: 'bw_2', name: "Buffer", amount: 100.00 },
                { id: 'bw_3', name: "NA Beer", amount: 60.00 }
            ],

            monthlyExpenses: [
                { id: 'm_1', name: "Rent + buffer", amount: 1050.00, dueDay: 1 },
                { id: 'm_2', name: "Daycare", amount: 220.00, dueDay: 1 },
                { id: 'm_3', name: "Cafe Liegeois", amount: 25.00, dueDay: 7 },
                { id: 'm_4', name: "Purchase Interest", amount: 60.00, dueDay: 10 },
                { id: 'm_5', name: "Iegeek", amount: 5.00, dueDay: 10 },
                { id: 'm_6', name: "Medication", amount: 26.00, dueDay: 10 },
                { id: 'm_7', name: "Rogers", amount: 170.00, dueDay: 14 },
                { id: 'm_8', name: "Spotify", amount: 28.00, dueDay: 15 },
                { id: 'm_9', name: "Amazon Prime", amount: 12.00, dueDay: 18 },
                { id: 'm_10', name: "PlayStation", amount: 15.00, dueDay: 19 },
                { id: 'm_11', name: "Fizz internet", amount: 53.00, dueDay: 22 },
                { id: 'm_12', name: "Amazon Subscription", amount: 12.00, dueDay: 24 },
                { id: 'm_13', name: "Monitor loan", amount: 130.00, dueDay: 26 }
            ],

            deferredBills: [],
            paidBills: []
        };

        // --- 2. TIME ENGINE ---
        const BASE_PAYDAY = new Date('2026-07-17T00:00:00');

        function updateCycleEngine() {
            const today = new Date();
            const msPerDay = 1000 * 60 * 60 * 24;

            const diffTime = today.getTime() - BASE_PAYDAY.getTime();
            const totalDaysSinceAnchor = Math.floor(diffTime / msPerDay);

            state.currentCycleIndex = Math.floor(totalDaysSinceAnchor / 14);
            const daysIntoCurrentCycle = totalDaysSinceAnchor % 14;
            state.daysRemaining = 14 - daysIntoCurrentCycle;

            state.cycleStart = new Date(today.getTime() - (daysIntoCurrentCycle * msPerDay));
            state.cycleEnd = new Date(today.getTime() + (state.daysRemaining * msPerDay));

            renderCycleHeaders();
        }

        function renderCycleHeaders() {
            const msPerDay = 1000 * 60 * 60 * 24;
            const formatDate = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            const cycles = [0, 1, 2].map(offset => {
                const start = new Date(state.cycleStart.getTime() + (offset * 14 * msPerDay));
                const end = new Date(start.getTime() + (14 * msPerDay));
                return { offset, start, end };
            });

            const headerHTML = cycles.map(c => {
                const isSelected = c.offset === state.viewOffset;
                const title = c.offset === 0 ? "Current cycle" : `Next cycle ${c.offset}`;
                const classNames = `cycle-selector ${isSelected ? 'active' : 'clickable'}`;

                return `<div class="${classNames}" onclick="setViewCycle(${c.offset})">${title}: ${formatDate(c.start)} – ${formatDate(c.end)}</div>`;
            }).join('');

            document.getElementById("cycle-header").innerHTML = headerHTML;
        }

        function setViewCycle(offset) {
            state.viewOffset = offset;
            renderCycleHeaders();
            recalculateCashFlow();
        }

        // --- 3. LOOK-AHEAD ALGORITHM ---
        function getExpensesForViewedCycle() {
            let cycleLiability = 0;
            let activeBills = [];
            const msPerDay = 1000 * 60 * 60 * 24;
            const today = new Date();

            const viewCycleIndex = state.currentCycleIndex + state.viewOffset;
            const viewCycleStart = new Date(state.cycleStart.getTime() + (state.viewOffset * 14 * msPerDay));
            const viewCycleEnd = new Date(viewCycleStart.getTime() + (14 * msPerDay));

            state.biweeklyExpenses.forEach(exp => {
                const instanceId = `${exp.id}_cycle_${viewCycleIndex}`;
                const isPaid = state.paidBills.includes(instanceId);

                if (state.viewOffset === 0) {
                    if (!isPaid) cycleLiability += exp.amount;
                } else {
                    if (today >= viewCycleStart && !isPaid) cycleLiability += exp.amount;
                }
                activeBills.push({...exp, id: instanceId, isBiweekly: true});
            });

            let startMonthYear = { m: BASE_PAYDAY.getMonth(), y: BASE_PAYDAY.getFullYear() };
            let endMonthYear = { m: viewCycleEnd.getMonth(), y: viewCycleEnd.getFullYear() };

            let currentLoopDate = new Date(startMonthYear.y, startMonthYear.m, 1);
            let endLoopDate = new Date(endMonthYear.y, endMonthYear.m, 1);

            while (currentLoopDate <= endLoopDate) {
                const m = currentLoopDate.getMonth();
                const y = currentLoopDate.getFullYear();

                state.monthlyExpenses.forEach(exp => {
                    let billDate = new Date(y, m, exp.dueDay);

                    if (billDate >= BASE_PAYDAY && billDate < viewCycleEnd) {
                        const instanceId = `${exp.id}_${y}_${m}`;

                        if (!state.deferredBills.includes(instanceId)) {
                            const isPaid = state.paidBills.includes(instanceId);
                            const isViewCycle = billDate >= viewCycleStart && billDate < viewCycleEnd;

                            if (isViewCycle || !isPaid) {
                                if (state.viewOffset === 0) {
                                    if (!isPaid) cycleLiability += exp.amount;
                                } else {
                                    if (billDate <= today && !isPaid) {
                                        cycleLiability += exp.amount;
                                    }
                                }

                                activeBills.push({
                                    ...exp,
                                    id: instanceId,
                                    isBiweekly: false,
                                    originalDate: billDate,
                                    isOverdue: billDate <= today && !isPaid
                                });
                            }
                        }
                    }
                });
                currentLoopDate.setMonth(currentLoopDate.getMonth() + 1);
            }

            activeBills.sort((a, b) => {
                if (a.isOverdue && !b.isOverdue) return -1;
                if (!a.isOverdue && b.isOverdue) return 1;
                if (a.isBiweekly && !b.isBiweekly) return -1;
                if (!a.isBiweekly && b.isBiweekly) return 1;
                if (a.originalDate && b.originalDate) return a.originalDate - b.originalDate;
                return 0;
            });

            return { total: cycleLiability, list: activeBills };
        }

        // --- 4. CALCULATION & UI UPDATE ---
        function updateAmount(instanceId, val) {
            const newAmount = parseFloat(val);
            if (isNaN(newAmount)) return;

            const baseIdMatch = instanceId.match(/^(bw_\d+|m_\d+)/);
            if (!baseIdMatch) return;
            const baseId = baseIdMatch[1];

            const bwExp = state.biweeklyExpenses.find(e => e.id === baseId);
            if (bwExp) bwExp.amount = newAmount;

            const mExp = state.monthlyExpenses.find(e => e.id === baseId);
            if (mExp) mExp.amount = newAmount;

            recalculateCashFlow();
        }

        function recalculateCashFlow() {
            const cycleData = getExpensesForViewedCycle();

            const labelEl = document.getElementById("bills-section-label");
            if (state.viewOffset === 0) {
                labelEl.innerText = "Active bills & liabilities";
            } else {
                labelEl.innerText = `Upcoming bills (next cycle ${state.viewOffset})`;
            }

            const listEl = document.getElementById("bills-list");
            listEl.innerHTML = '';

            if (cycleData.list.length === 0) {
                listEl.innerHTML = '<div class="bill-row" style="color:var(--text-dim); justify-content:center;">No upcoming bills</div>';
            }

            cycleData.list.forEach(bill => {
                const isPaid = state.paidBills.includes(bill.id);
                const isOverdue = !!bill.isOverdue;
                const row = document.createElement('div');
                row.className = 'bill-row';

                const nameClass = isPaid ? 'paid-text' : (isOverdue ? 'overdue-text' : '');

                // If the bill isn't biweekly, generate the push/skip button. Otherwise, leave it blank.
                const pushAction = bill.isBiweekly ? '' : `<button class="push-btn" onclick="pushBill('${bill.id}')" title="Push to next cycle">&raquo;</button>`;

                let subtitle = '';
                if (bill.isBiweekly) {
                    subtitle = 'Biweekly · Flexible';
                } else if (bill.originalDate) {
                    subtitle = bill.originalDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                }

                row.innerHTML = `
                    <div class="bill-left-col">
                        <input type="checkbox" ${isPaid ? 'checked' : ''} onchange="togglePaid('${bill.id}')">
                        <div class="bill-text-col">
                            <span class="bill-name ${nameClass}">${bill.name}</span>
                            ${subtitle ? `<span class="bill-subtitle ${nameClass}">${subtitle}</span>` : ''}
                        </div>
                    </div>
                    <div class="bill-right-col">
                        <span class="bill-amount ${nameClass}">$</span>
                        <input type="number" class="bill-amount-input bill-amount ${nameClass}" value="${Math.round(bill.amount)}" onchange="updateAmount('${bill.id}', this.value)" step="1">
                        <div class="action-slot">
                            ${pushAction}
                        </div>
                    </div>
                `;
                listEl.appendChild(row);
            });

            let disposableLiquidity = state.currentBalance - cycleData.total;
            let daysDivisor = state.viewOffset === 0 ? state.daysRemaining : 14;
            let safeToSpendDaily = disposableLiquidity / daysDivisor;

            if (disposableLiquidity < 0) disposableLiquidity = 0;
            if (safeToSpendDaily < 0) safeToSpendDaily = 0;

            document.getElementById("total-safe").innerText = `TOTAL: $${Math.round(disposableLiquidity)}`;
            document.getElementById("safe-to-spend").innerText = `$${Math.round(safeToSpendDaily)} / day`;
        }

        // --- 5. INTERACTIONS ---
        document.getElementById("balance-input").addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.currentBalance = isNaN(val) ? 0 : val;
            recalculateCashFlow();
        });

        function pushBill(instanceId) {
            if (!state.deferredBills.includes(instanceId)) {
                state.deferredBills.push(instanceId);
                recalculateCashFlow();
            }
        }

        function togglePaid(instanceId) {
            if (state.paidBills.includes(instanceId)) {
                state.paidBills = state.paidBills.filter(id => id !== instanceId);
            } else {
                state.paidBills.push(instanceId);
            }
            recalculateCashFlow();
        }

        // --- 6. LIVE INTEGRATION SYSTEM ---
        async function executeLiveTextQuery() {
            const queryText = document.getElementById("gemini-input").value.trim();
            if (!queryText) return;

            const container = document.getElementById("ai-response-container");
            const safeDaily = document.getElementById("safe-to-spend").innerText;
            const safeTotal = document.getElementById("total-safe").innerText;

            container.innerHTML = `<div class="ai-output-card">Processing query...</div>`;

            const financialContext = `
                Contextual Data:
                - Current view safe to spend: ${safeDaily}
                - Current view total disposable liquidity: ${safeTotal}
                - Days remaining in current cycle: ${state.daysRemaining}
                User Financial Query: "${queryText}"

                Instructions: Answer the query directly and accurately using the context metadata provided. Keep it straightforward.
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${getApiKey()}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: financialContext }] }]
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0]) {
                    const resultText = data.candidates[0].content.parts[0].text;
                    container.innerHTML = `<div class="ai-output-card">${resultText}</div>`;
                } else {
                    container.innerHTML = `<div class="ai-output-card">Error structural layout output failure.</div>`;
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="ai-output-card">Connection failed to reach generative endpoints.</div>`;
            }
            document.getElementById("gemini-input").value = "";
        }

        // --- 7. VOICE-TO-TEXT ENGINE ---
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        async function toggleVoiceRecording() {
            const btn = document.getElementById('voice-btn');

            if (isRecording) {
                mediaRecorder.stop();
                btn.classList.remove('recording');
                btn.innerText = "Voice input";
                isRecording = false;
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        await processAudioWithGemini(audioBlob);
                    };

                    mediaRecorder.start();
                    btn.classList.add('recording');
                    btn.innerText = "Recording...";
                    isRecording = true;
                } catch (err) {
                    console.error("Microphone access denied or failed.", err);
                    alert("Unable to access microphone.");
                }
            }
        }

        async function processAudioWithGemini(audioBlob) {
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                document.getElementById('gemini-input').value = "Processing audio...";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${getApiKey()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Transcribe the following audio strictly into text. Do not add any other conversational filler. If it is a financial query, structure it clearly." },
                                    { inlineData: { mimeType: "audio/webm", data: base64Audio } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (data.candidates && data.candidates[0]) {
                        const transcription = data.candidates[0].content.parts[0].text;
                        document.getElementById('gemini-input').value = transcription.trim();
                    } else {
                        document.getElementById('gemini-input').value = "Error: Could not transcribe audio.";
                    }
                } catch (error) {
                    console.error("API Error:", error);
                    document.getElementById('gemini-input').value = "Connection error to Gemini API.";
                }
            };
        }

        // --- 8. THEME ENGINE CONFIGURATION ---
        const THEMES = {
            minimal: {
                name: 'Minimal',
                subs: [
                    { name: 'Light', bg: '#e4e2dd', surface: '#e4e2dd', surface2: '#e4e2dd', accent: '#1a1a1a', onAccent: '#e4e2dd', textHi: '#1a1a1a', text: '#444444', dim: '#777777', hr: '#1a1a1a' },
                    { name: 'Warm', bg: '#f4f3f0', surface: '#f4f3f0', surface2: '#f4f3f0', accent: '#111111', onAccent: '#f4f3f0', textHi: '#111111', text: '#444444', dim: '#777777', hr: '#111111' }
                ]
            },
            minimal_dark: {
                name: 'Min Flat',
                subs: [
                    { name: 'Dark', bg: '#1a1a1a', surface: '#1a1a1a', surface2: '#1a1a1a', accent: '#e4e2dd', onAccent: '#1a1a1a', textHi: '#e4e2dd', text: '#999999', dim: '#777777', hr: '#e4e2dd' },
                    { name: 'OLED', bg: '#000000', surface: '#000000', surface2: '#000000', accent: '#ffffff', onAccent: '#000000', textHi: '#ffffff', text: '#aaaaaa', dim: '#555555', hr: '#ffffff' }
                ]
            }
        };

        const themeList = {
            'default': { id: 'default', name: 'Default' },
            'minimal-light': { id: 'minimal-light', name: 'Minimal Light', theme: 'minimal', subIndex: 0 },
            'minimal-warm': { id: 'minimal-warm', name: 'Minimal Warm', theme: 'minimal', subIndex: 1 },
            'minimal-dark': { id: 'minimal-dark', name: 'Minimal Dark', theme: 'minimal_dark', subIndex: 0 },
            'minimal-oled': { id: 'minimal-oled', name: 'Minimal OLED', theme: 'minimal_dark', subIndex: 1 }
        };

        function applyTheme(themeKey) {
            const activeTheme = themeList[themeKey] || themeList['default'];
            const root = document.documentElement;

            ['--bg', '--surface', '--surface2', '--accent', '--on-accent', '--text-hi', '--text', '--dim', '--hr'].forEach(v => root.style.removeProperty(v));

            if (activeTheme.id === 'default') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', activeTheme.theme);
                const sub = THEMES[activeTheme.theme].subs[activeTheme.subIndex];
                root.style.setProperty('--bg', sub.bg);
                root.style.setProperty('--surface', sub.surface);
                root.style.setProperty('--surface2', sub.surface2);
                root.style.setProperty('--accent', sub.accent);
                root.style.setProperty('--on-accent', sub.onAccent);
                root.style.setProperty('--text-hi', sub.textHi);
                root.style.setProperty('--text', sub.text);
                root.style.setProperty('--dim', sub.dim);
                root.style.setProperty('--hr', sub.hr);
            }

            const selectEl = document.getElementById('theme-select');
            if (selectEl) {
                selectEl.value = activeTheme.id;
            }

            localStorage.setItem('budget-theme-key', activeTheme.id);
        }

        function changeTheme(themeKey) {
            applyTheme(themeKey);
        }

        // Toggles the combined Gemini tools + settings panel
        function toggleSettingsMenu() {
            const panel = document.getElementById('expanded-panel');
            const btn = document.getElementById('settings-toggle-btn');
            const icon = document.getElementById('sparkle-icon');
            if (panel.style.display === 'none' || !panel.style.display) {
                panel.style.display = 'flex';
                btn.style.color = 'var(--text-main)';
                icon.style.transform = 'rotate(180deg)';
            } else {
                panel.style.display = 'none';
                btn.style.color = 'var(--text-dim)';
                icon.style.transform = 'rotate(0deg)';
            }
        }

        // --- 9. FONT SIZE ENGINE CONFIGURATION ---
        const SIZES = {
            'normal': 1.1,
            'large': 1.35,
            'huge': 1.6
        };

        function applySize(sizeKey) {
            const scale = SIZES[sizeKey] || 1.1;
            const root = document.documentElement;
            root.style.setProperty('--fs-scale', scale);

            ['normal', 'large', 'huge'].forEach(s => {
                const btn = document.getElementById(`btn-size-${s}`);
                if (btn) {
                    if (s === sizeKey) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });

            localStorage.setItem('budget-size-key', sizeKey);
        }

        function changeSize(sizeKey) {
            applySize(sizeKey);
        }

        // --- INIT ---
        updateCycleEngine();
        recalculateCashFlow();

        try {
            const savedTheme = localStorage.getItem('budget-theme-key');
            if (savedTheme && themeList[savedTheme]) {
                applyTheme(savedTheme);
            } else {
                applyTheme('default');
            }
        } catch (e) {
            applyTheme('default');
        }

        try {
            const savedSize = localStorage.getItem('budget-size-key');
            if (savedSize && SIZES[savedSize]) {
                applySize(savedSize);
            } else {
                applySize('normal');
            }
        } catch (e) {
            applySize('normal');
        }

    </script>
